<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520">
  <defs>
    <pattern id="dots" x="0" y="0" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="18" r="1.4" fill="rgba(255,255,255,0.11)"/>
    </pattern>
  </defs>

  <!-- Dot grid across entire surface -->
  <rect width="100%" height="100%" fill="url(#dots)"/>

  <!-- Decorative concentric rings (top-right accent) -->
  <circle cx="700" cy="70"  r="90"  fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <circle cx="700" cy="70"  r="150" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <circle cx="700" cy="70"  r="215" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <circle cx="700" cy="70"  r="285" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/>

  <!-- Subtle map grid lines -->
  <g stroke="rgba(255,255,255,0.035)" stroke-width="1">
    <line x1="200" y1="0"   x2="200" y2="520"/>
    <line x1="400" y1="0"   x2="400" y2="520"/>
    <line x1="600" y1="0"   x2="600" y2="520"/>
    <line x1="0"   y1="173" x2="800" y2="173"/>
    <line x1="0"   y1="347" x2="800" y2="347"/>
  </g>

  <!-- Pharmacy cross motifs (scattered, very faint gold tint) -->
  <g fill="rgba(248,196,0,0.07)">
    <!-- cross = two overlapping rects -->
    <rect x="68"  y="300" width="6"  height="20"/>
    <rect x="62"  y="306" width="18" height="8"/>

    <rect x="430" y="80"  width="5"  height="17"/>
    <rect x="425" y="85"  width="15" height="7"/>

    <rect x="590" y="380" width="6"  height="20"/>
    <rect x="584" y="386" width="18" height="8"/>

    <rect x="160" y="60"  width="5"  height="16"/>
    <rect x="155" y="65"  width="15" height="6"/>
  </g>

  <!-- Small pill capsule shapes -->
  <g fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1.5">
    <rect x="300" y="420" width="40" height="16" rx="8"/>
    <line x1="320" y1="420" x2="320" y2="436"/>
    <rect x="520" y="160" width="34" height="14" rx="7"/>
    <line x1="537" y1="160" x2="537" y2="174"/>
  </g>
</svg>
