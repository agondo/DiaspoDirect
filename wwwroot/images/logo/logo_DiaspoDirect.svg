<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90" width="300" height="90">

  <!-- ── Icon mark ── -->
  <rect x="4" y="10" width="68" height="68" rx="13" fill="#1B3A6B"/>

  <!-- Globe wireframe, centered at (38,44) r=20 -->
  <circle cx="38" cy="44" r="20" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.2"/>
  <!-- Equator -->
  <line x1="18" y1="44" x2="58" y2="44" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
  <!-- Left meridian arc -->
  <path d="M38 24 Q27 44 38 64" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- Right meridian arc -->
  <path d="M38 24 Q49 44 38 64" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>
  <!-- Upper parallel -->
  <path d="M21 34 Q38 29 55 34" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.8"/>
  <!-- Lower parallel -->
  <path d="M21 54 Q38 59 55 54" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="0.8"/>

  <!-- Pharmacy cross (gold), centered at (38,44) -->
  <rect x="35" y="35" width="6" height="18" rx="1.5" fill="#F8C400"/>
  <rect x="29" y="41" width="18" height="6" rx="1.5" fill="#F8C400"/>

  <!-- Small "send" arrow — top-right corner of icon, hinting at Direct -->
  <g stroke="#F8C400" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.75">
    <line x1="55" y1="22" x2="63" y2="22"/>
    <polyline points="60,19 63,22 60,25"/>
  </g>

  <!-- ── Wordmark ── -->
  <text x="84" y="51"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="27"
        fill="#1B3A6B">
    <tspan font-weight="300" letter-spacing="-0.2">Diaspo</tspan><tspan font-weight="800">Direct</tspan>
  </text>

  <!-- Gold accent bar under "Direct" (approximate position) -->
  <rect x="170" y="55" width="96" height="2.5" rx="1.2" fill="#F8C400"/>

  <!-- ── Tagline ── -->
  <text x="85" y="70"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="7.5"
        font-weight="400"
        fill="#9CA3AF"
        letter-spacing="2">BY FLAUBERT GROUP</text>

</svg>
